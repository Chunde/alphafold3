<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlphaFold3 Web GUI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
</head>
<body>
  <!-- Top App Bar -->
  <header class="app-bar">
    <div class="app-bar-left">
      <span class="app-logo"><img src="https://www.gstatic.com/images/branding/productlogos/google_deepmind/v3/192px.svg" alt="" width="24" height="24"> AlphaFold3</span>
      <nav class="app-tabs">
        <a href="#submit" class="app-tab active" data-nav="submit">Server</a>
        <a href="#queue" class="app-tab" data-nav="queue">Jobs</a>
        <a href="#results" class="app-tab" data-nav="results">Results</a>
        <a href="#config" class="app-tab" data-nav="config">Settings</a>
      </nav>
    </div>
    <div class="app-bar-right">
      <span id="statusBadge" class="badge-status">Checking...</span>
    </div>
  </header>

  <!-- Layout -->
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="app-sidebar" id="sidebar">
      <nav class="sidebar-nav" id="sidebarNav">
        <!-- Populated by app.js per panel -->
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="app-main">
      <div class="tab-content" id="mainTabContent">
        <div class="tab-pane fade show active" id="panel-submit"></div>
        <div class="tab-pane fade" id="panel-queue"></div>
        <div class="tab-pane fade" id="panel-results"></div>
        <div class="tab-pane fade" id="panel-config"></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ngl@2.0.0-dev.39/dist/ngl.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/app.js"></script>
  <script src="/static/js/submit-panel.js"></script>
  <script src="/static/js/queue-panel.js"></script>
  <script src="/static/js/result-panel.js"></script>
  <script src="/static/js/structure-viewer.js"></script>
  <script src="/static/js/pae-heatmap.js"></script>
  <script src="/static/js/confidence-plot.js"></script>
  <script src="/static/js/config-panel.js"></script>
</body>
</html>
